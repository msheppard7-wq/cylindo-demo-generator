<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cylindo Demo</title>
  <link rel="preconnect" href="https://content.cylindo.com" crossorigin />
  <script type="module" src="https://viewer-cdn.cylindo.com/v1/index.mjs" async></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar -->
  <div class="announcement-bar" id="announcement-bar"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo" id="logo"></a>
      <nav class="main-nav" id="main-nav"></nav>
      <div class="header-actions">
        <button class="icon-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" aria-label="Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="icon-btn cart-btn" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Product Switcher -->
  <div class="product-switcher" id="product-switcher"></div>

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <div class="container" id="breadcrumb"></div>
  </div>

  <!-- Main Product Section -->
  <main class="product-section">
    <div class="container product-grid">

      <!-- Left: Cylindo 3D Viewer -->
      <div class="product-media">
        <div class="cylindo-wrapper" id="cylindo-container"></div>
        <!-- Tear Sheet Download Button -->
        <button class="tearsheet-btn" id="tearsheet-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
          <span>Download Tear Sheet</span>
        </button>
      </div>

      <!-- Right: Product Info -->
      <div class="product-info" id="product-info"></div>
    </div>
  </main>

  <!-- Feature Highlights -->
  <section class="features-section">
    <div class="container">
      <h2 class="section-title">What Makes It Special</h2>
      <div class="features-grid" id="features-grid"></div>
    </div>
  </section>

  <!-- Specifications -->
  <section class="specs-section">
    <div class="container">
      <h2 class="section-title">Specifications</h2>
      <div class="specs-grid" id="specs-grid"></div>
    </div>
  </section>

  <!-- FAQ Section -->
  <section class="faq-section">
    <div class="container">
      <h2 class="section-title">Frequently Asked Questions</h2>
      <div class="faq-list" id="faq-list"></div>
    </div>
  </section>

  <!-- Cylindo Powered Banner -->
  <section class="cylindo-banner">
    <div class="container">
      <div class="cylindo-badge-large">
        <span class="powered-by">3D Product Visualization Powered by</span>
        <span class="cylindo-brand">Cylindo</span>
      </div>
      <p>This demo showcases how Cylindo's interactive 3D viewer integrates seamlessly into a branded product page, replacing static photography with an engaging 360&deg; experience.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-grid" id="footer-grid"></div>
    <div class="footer-bottom">
      <p id="footer-copyright"></p>
    </div>
  </footer>

  <!-- Tear Sheet Modal (hidden, used for PDF generation) -->
  <div class="tearsheet-overlay" id="tearsheet-overlay">
    <div class="tearsheet-modal" id="tearsheet-modal">
      <button class="tearsheet-close" id="tearsheet-close" type="button">&times;</button>
      <div class="tearsheet-actions">
        <button class="tearsheet-print-btn" id="tearsheet-print-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Save as PDF
        </button>
      </div>
      <div class="tearsheet-content" id="tearsheet-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
